<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY 12 • FORRÓ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .player { text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 2rem; color: #ff00aa; margin-bottom: 5px; }
        .sub { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .title { font-size: 1.5rem; font-weight: bold; margin: 15px 0 5px; }
        .artist { color: #aaa; margin-bottom: 20px; }
        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #ff00aa; border: none; padding: 12px 30px; border-radius: 30px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .btn-sec { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-voltar { background: #333; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin-top: 15px; }
        .status { color: #666; font-size: 0.7rem; margin-top: 10px; }
        .loading { color: #ff00aa; margin-top: 20px; }
        .erro { color: #ff4444; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="player">
        <h1>🪗 FORRÓ</h1>
        <div class="sub">PLAY 12 • O melhor do forró</div>
        
        <div id="loadingMsg" class="loading">⏳ Carregando músicas...</div>
        <div id="erroMsg" class="erro">❌ Erro ao carregar. Tente novamente.</div>
        
        <div id="playerContent" style="display:none;">
            <div class="title" id="title">Carregando...</div>
            <div class="artist" id="artist">Aguarde</div>
            
            <div class="controls">
                <button class="btn" id="playBtn">▶ PLAY</button>
                <button class="btn btn-sec" id="nextBtn">⏭ PRÓXIMA</button>
            </div>
            
            <button class="btn-voltar" onclick="window.location.href='https://radiolojasjc-hub.github.io/play12/'">← VOLTAR AO PLAY 12</button>
            <div class="status" id="status">Carregando...</div>
        </div>
    </div>

    <script>
        // PLAYER SIMPLES
        const audio = new Audio();
        let musicas = [];
        let index = 0;
        let isPlaying = false;

        const loadingMsg = document.getElementById('loadingMsg');
        const erroMsg = document.getElementById('erroMsg');
        const playerContent = document.getElementById('playerContent');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playBtn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');

        async function carregarPlaylist() {
            try {
                // Tenta carregar o JSON
                const response = await fetch('forro.json');
                if (!response.ok) throw new Error('Arquivo não encontrado');
                
                const data = await response.json();
                if (!data || data.length === 0) throw new Error('Playlist vazia');
                
                musicas = data;
                
                // Esconde loading, mostra player
                loadingMsg.style.display = 'none';
                playerContent.style.display = 'block';
                
                // Toca a primeira música
                tocar(0);
                
            } catch (error) {
                console.error('Erro:', error);
                loadingMsg.style.display = 'none';
                erroMsg.style.display = 'block';
                
                // Tenta usar músicas de exemplo se o JSON falhar
                musicas = [
                    {title: "Amor de Novela", artist: "Calcinha Preta", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
                    {title: "O Melhor é Você", artist: "Mastruz com Leite", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
                    {title: "Brincar de Amar", artist: "Aviões do Forró", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
                ];
                loadingMsg.style.display = 'none';
                erroMsg.style.display = 'none';
                playerContent.style.display = 'block';
                tocar(0);
            }
        }

        function tocar(idx) {
            if (idx >= musicas.length) idx = 0;
            if (idx < 0) idx = musicas.length - 1;
            index = idx;
            
            const m = musicas[index];
            title.textContent = m.title;
            artist.textContent = m.artist;
            status.textContent = `Tocando ${index+1}/${musicas.length}`;
            
            audio.src = m.src;
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸ PAUSE';
            }).catch(() => {
                // Se falhar, tenta a próxima
                setTimeout(() => proxima(), 2000);
            });
        }

        function proxima() {
            tocar(index + 1);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸ PAUSE';
            } else {
                audio.pause();
                playBtn.textContent = '▶ PLAY';
            }
        }

        // Eventos
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', proxima);
        
        audio.addEventListener('ended', proxima);
        audio.addEventListener('play', () => { isPlaying = true; playBtn.textContent = '⏸ PAUSE'; });
        audio.addEventListener('pause', () => { if (!audio.ended) { isPlaying = false; playBtn.textContent = '▶ PLAY'; } });

        // Iniciar
        carregarPlaylist();
    </script>
</body>
</html>
