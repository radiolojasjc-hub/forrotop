<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY 12 • FORRÓ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .player { text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 2rem; color: #ff00aa; }
        .sub { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .title { font-size: 1.5rem; font-weight: bold; margin: 15px 0 5px; }
        .artist { color: #aaa; margin-bottom: 20px; }
        .btn { background: #ff00aa; border: none; padding: 12px 30px; border-radius: 30px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; margin: 5px; }
        .btn:active { transform: scale(0.95); }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-voltar { background: #333; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin-top: 15px; }
        .status { color: #666; font-size: 0.7rem; margin-top: 10px; }
        .loading { color: #ff00aa; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="player">
        <h1>🪗 FORRÓ</h1>
        <div class="sub">PLAY 12 • O melhor do forró</div>
        
        <div id="loading" class="loading">⏳ Carregando músicas...</div>
        
        <div id="player" style="display:none;">
            <div class="title" id="title">Carregando...</div>
            <div class="artist" id="artist">Aguarde</div>
            
            <div>
                <button class="btn" id="playBtn">▶ PLAY</button>
                <button class="btn btn-sec" id="nextBtn">⏭ PRÓXIMA</button>
            </div>
            
            <button class="btn-voltar" onclick="window.location.href='https://radiolojasjc-hub.github.io/play12/'">← VOLTAR</button>
            <div class="status" id="status">Pronto</div>
        </div>
    </div>

    <script>
        // PLAYER SIMPLES - VAI FUNCIONAR MESMO SEM ARQUIVOS
        const audio = new Audio();
        let musicas = [];
        let index = 0;

        // PLAYLIST COM ÁUDIOS DE TESTE (FUNCIONAM 100%)
        const PLAYLIST_TESTE = [
            {title: "Música 1 - Forró", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
            {title: "Música 2 - Forró", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
            {title: "Música 3 - Forró", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
            {title: "Música 4 - Forró", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
            {title: "Música 5 - Forró", artist: "Artista Teste", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"}
        ];

        const loading = document.getElementById('loading');
        const player = document.getElementById('player');
        const title = document.getElementById('title');
        const artist = document.getElementById('artist');
        const playBtn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');

        async function iniciar() {
            try {
                // Tenta carregar o forro.json
                const response = await fetch('forro.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.length > 0) {
                        musicas = data;
                    } else {
                        musicas = PLAYLIST_TESTE;
                    }
                } else {
                    musicas = PLAYLIST_TESTE;
                }
            } catch (e) {
                musicas = PLAYLIST_TESTE;
            }

            // Mostra o player
            loading.style.display = 'none';
            player.style.display = 'block';
            
            // Toca a primeira música
            tocar(0);
        }

        function tocar(idx) {
            if (idx >= musicas.length) idx = 0;
            if (idx < 0) idx = musicas.length - 1;
            index = idx;
            
            const m = musicas[index];
            title.textContent = m.title || 'Sem título';
            artist.textContent = m.artist || 'Artista desconhecido';
            status.textContent = `${index+1}/${musicas.length}`;
            
            audio.src = m.src;
            audio.load();
            
            audio.play().then(() => {
                playBtn.textContent = '⏸ PAUSE';
            }).catch(() => {
                // Se falhar, tenta a próxima
                setTimeout(() => tocar(index + 1), 2000);
            });
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸ PAUSE';
            } else {
                audio.pause();
                playBtn.textContent = '▶ PLAY';
            }
        }

        function proxima() {
            tocar(index + 1);
        }

        // Eventos
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', proxima);
        audio.addEventListener('ended', () => tocar(index + 1));
        audio.addEventListener('play', () => { playBtn.textContent = '⏸ PAUSE'; });
        audio.addEventListener('pause', () => { if (!audio.ended) playBtn.textContent = '▶ PLAY'; });

        // Iniciar
        iniciar();
    </script>
</body>
</html>
